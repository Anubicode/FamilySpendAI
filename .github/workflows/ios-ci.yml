name: iOS CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build And Test iOS App
    runs-on: macos-latest
    timeout-minutes: 30

    defaults:
      run:
        shell: bash

    env:
      PROJECT_PATH: FamilySpendAI.xcodeproj
      SCHEME: FamilySpendAI
      TEST_TARGET: FamilySpendAITests
      UI_TEST_TARGET: FamilySpendAIUITests
      DERIVED_DATA_PATH: ${{ github.workspace }}/DerivedData
      LOGS_DIR: ${{ github.workspace }}/ci_logs

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Print Xcode version
        run: |
          set -euxo pipefail
          xcodebuild -version
          xcode-select -p
          sw_vers

      - name: Print project files and schemes
        run: |
          set -euxo pipefail
          find . -maxdepth 4 \( -name "*.xcodeproj" -o -name "*.xcscheme" \) | sort
          xcodebuild -list -project "$PROJECT_PATH"

      - name: Print available iOS simulators
        run: |
          set -euxo pipefail
          xcrun simctl list devices available
          xcrun simctl list runtimes available
          xcrun simctl list devicetypes

      - name: Select simulator
        id: simulator
        run: |
          set -euo pipefail
          destination="$(bash ci/select-simulator.sh)"
          echo "destination=$destination" >> "$GITHUB_OUTPUT"
          echo "Selected destination: $destination"

      - name: Build for iOS Simulator
        env:
          DESTINATION: ${{ steps.simulator.outputs.destination }}
        run: |
          set -euo pipefail
          mkdir -p "$LOGS_DIR"
          echo "Building with destination: $DESTINATION"

          if ! xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -destination "$DESTINATION" \
            -sdk iphonesimulator \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            CODE_SIGNING_ALLOWED=NO \
            build \
            2>&1 | tee "$LOGS_DIR/xcodebuild-build.log"; then
            echo "::error::iOS build failed."
            echo "---- Build errors and warnings ----"
            grep -nE "error:|warning:|fatal error:" "$LOGS_DIR/xcodebuild-build.log" | tail -n 120 || true
            echo "---- Build log tail ----"
            tail -n 200 "$LOGS_DIR/xcodebuild-build.log" || true
            echo "---- Available schemes after failure ----"
            xcodebuild -list -project "$PROJECT_PATH" || true
            echo "---- Available simulators after failure ----"
            xcrun simctl list devices available || true
            exit 1
          fi

      - name: Run unit tests
        env:
          DESTINATION: ${{ steps.simulator.outputs.destination }}
        run: |
          set -euo pipefail
          mkdir -p "$LOGS_DIR"
          rm -rf "$LOGS_DIR/unit-tests.xcresult"
          echo "Testing with destination: $DESTINATION"

          if ! xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -destination "$DESTINATION" \
            -sdk iphonesimulator \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -resultBundlePath "$LOGS_DIR/unit-tests.xcresult" \
            CODE_SIGNING_ALLOWED=NO \
            -only-testing:"$TEST_TARGET" \
            test \
            2>&1 | tee "$LOGS_DIR/xcodebuild-test.log"; then
            echo "::error::iOS unit tests failed."
            echo "If the blocker is scheme visibility, target discovery, simulator availability, or a compile/test failure, it will be in the xcodebuild log below."
            echo "---- Test errors and warnings ----"
            grep -nE "error:|warning:|fatal error:" "$LOGS_DIR/xcodebuild-test.log" | tail -n 120 || true
            echo "---- Test log tail ----"
            tail -n 200 "$LOGS_DIR/xcodebuild-test.log" || true
            echo "---- Available schemes after failure ----"
            xcodebuild -list -project "$PROJECT_PATH" || true
            echo "---- Available simulators after failure ----"
            xcrun simctl list devices available || true
            exit 1
          fi

      - name: Run UI receipt image tests
        env:
          DESTINATION: ${{ steps.simulator.outputs.destination }}
        run: |
          set -euo pipefail
          mkdir -p "$LOGS_DIR"
          rm -rf "$LOGS_DIR/ui-tests.xcresult"
          echo "Running UI tests with destination: $DESTINATION"

          if ! xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -destination "$DESTINATION" \
            -sdk iphonesimulator \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -resultBundlePath "$LOGS_DIR/ui-tests.xcresult" \
            CODE_SIGNING_ALLOWED=NO \
            -only-testing:"$UI_TEST_TARGET" \
            test \
            2>&1 | tee "$LOGS_DIR/xcodebuild-ui-test.log"; then
            echo "::error::iOS UI receipt image tests failed."
            echo "---- UI test errors and warnings ----"
            grep -nE "error:|warning:|fatal error:" "$LOGS_DIR/xcodebuild-ui-test.log" | tail -n 120 || true
            echo "---- UI test log tail ----"
            tail -n 200 "$LOGS_DIR/xcodebuild-ui-test.log" || true
            echo "---- Available schemes after failure ----"
            xcodebuild -list -project "$PROJECT_PATH" || true
            echo "---- Available simulators after failure ----"
            xcrun simctl list devices available || true
            exit 1
          fi

      - name: Export UI test screenshots
        if: always()
        run: |
          set -euo pipefail
          mkdir -p "$LOGS_DIR/ui_screenshots"
          bash ci/export-ui-screenshots.sh "$LOGS_DIR/ui-tests.xcresult" "$LOGS_DIR/ui_screenshots" "$LOGS_DIR/xcodebuild-ui-test.log"

      - name: Upload CI logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ios-ci-logs
          path: ${{ env.LOGS_DIR }}

      - name: Upload UI test screenshots
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ui-test-screenshots
          path: ${{ env.LOGS_DIR }}/ui_screenshots
          if-no-files-found: warn
